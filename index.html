<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gerald G. — Software Engineer at Google." />
  <title>Gerald G.</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <span class="wordmark">G.</span>
    <button class="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
        <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
        <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
        <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
      </svg>
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <main>

    <section class="hero">
      <h1>Gerald G.</h1>
      <p class="role">Software Engineer at <span class="g-google">Google</span></p>
      <p class="bio">I build things for the web. I read, watch, and have opinions about all of it.</p>

      <nav class="social-links" aria-label="Social links">
        <a href="https://github.com/geraldelorm" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="#" target="_blank" rel="noopener noreferrer">Twitter</a>
        <a href="#" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a href="#" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="#" target="_blank" rel="noopener noreferrer">Substack</a>
      </nav>
    </section>

    <section class="hotlist">
      <div class="hotlist-header">
        <h2>Hotlist</h2>
        <p class="hotlist-sub">Things I'm into right now.</p>
      </div>

      <div class="tabs" role="tablist">
        <button class="tab active" role="tab" aria-selected="true"  data-tab="books">Books</button>
        <button class="tab"        role="tab" aria-selected="false" data-tab="tv">TV</button>
        <button class="tab"        role="tab" aria-selected="false" data-tab="movies">Movies</button>
        <button class="tab"        role="tab" aria-selected="false" data-tab="youtube">YouTube</button>
      </div>

      <div class="tab-panels">

        <div class="tab-panel active" id="panel-books" role="tabpanel">
          <ul class="hotlist-items" id="list-books"></ul>
        </div>

        <div class="tab-panel" id="panel-tv" role="tabpanel">
          <ul class="hotlist-items" id="list-tv"></ul>
        </div>

        <div class="tab-panel" id="panel-movies" role="tabpanel">
          <ul class="hotlist-items" id="list-movies"></ul>
        </div>

        <div class="tab-panel" id="panel-youtube" role="tabpanel">
          <ul class="hotlist-items" id="list-youtube"></ul>
        </div>

      </div>
    </section>

  </main>

  <footer>
    <span>Gerald G. &copy; <span id="year"></span></span>
    <span class="footer-right">Built with intent.</span>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
